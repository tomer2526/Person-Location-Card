<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Person Location Card CSS Preview</title>
    <style>
      :root {
        --primary-color: #03a9f4;
        --primary-text-color: #111111;
        --secondary-text-color: #6b7280;
        --secondary-background-color: #f3f4f6;
        --card-background-color: #ffffff;
        --divider-color: #e5e7eb;
        --text-primary-color: #ffffff;
      }

      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #f8fafc;
        color: var(--primary-text-color);
        padding: 24px;
      }

      .form {
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-width: 960px;
      }
      .devices {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .labels {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .device-row {
        display: grid;
        grid-template-columns: auto 1fr 1fr auto;
        gap: 8px;
        align-items: center;
      }
      .device-block {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .device-title {
        font-weight: 600;
        color: var(--primary-text-color);
      }
      .picker-col {
        display: flex;
        flex-direction: column;
        gap: 4px;
        width: auto;
      }
      .picker-meta {
        font-size: 12px;
        color: var(--secondary-text-color);
      }
      .entity-input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 6px;
        border: 1px solid var(--divider-color);
        background: var(--card-background-color);
        color: var(--primary-text-color);
        font-size: 14px;
      }
      .drag-handle {
        border: none;
        background: var(--secondary-background-color);
        color: var(--secondary-text-color);
        font-size: 16px;
        cursor: pointer;
        padding: 6px 8px;
        line-height: 1;
        border-radius: 6px;
        user-select: none;
      }
      .drag-handle:hover {
        color: var(--primary-text-color);
      }
      .device-row.drag-over {
        outline: 2px dashed var(--primary-color);
        outline-offset: 2px;
      }
      .add-device {
        align-self: flex-start;
        background: var(--primary-color);
        color: var(--text-primary-color, #ffffff);
        border: none;
        border-radius: 6px;
        padding: 8px 14px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .add-device:hover {
        filter: brightness(1.05);
      }
      .remove-device {
        border: none;
        background: transparent;
        color: var(--secondary-text-color);
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
        padding: 6px;
      }
      .remove-device:hover {
        color: var(--primary-text-color);
      }
      .hint {
        font-size: 12px;
        color: var(--secondary-text-color);
      }
      .section {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 16px;
      }
    </style>
  </head>
  <body>
    <div class="section">
      <div class="form">
        <label>
          <div class="hint">Name</div>
          <input class="entity-input" value="Alex" />
        </label>

        <div class="devices">
          <div class="device-block">
            <div class="device-title">Device 1</div>
            <div class="device-row">
              <button class="remove-device" aria-label="Remove">×</button>
              <div class="picker-col">
                <input class="entity-input" value="sensor.alex_phone_ble_area" />
                <div class="picker-meta">Alex Phone (sensor.alex_phone_ble_area)</div>
              </div>
              <input class="entity-input" value="Phone" />
              <button class="drag-handle" aria-label="Drag">≡</button>
            </div>
          </div>

          <div class="device-block">
            <div class="device-title">Device 2</div>
            <div class="device-row">
              <button class="remove-device" aria-label="Remove">×</button>
              <div class="picker-col">
                <input class="entity-input" value="sensor.alex_watch_ble_area" />
                <div class="picker-meta">Alex Watch (sensor.alex_watch_ble_area)</div>
              </div>
              <input class="entity-input" value="Watch" />
              <button class="drag-handle" aria-label="Drag">≡</button>
            </div>
          </div>

          <button class="add-device" type="button">Add device</button>
          <div class="hint">You can set a label for each device. If not set, the default is Device 1/2/3…</div>
        </div>
      </div>
    </div>
  </body>
</html>
